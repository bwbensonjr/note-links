<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note Links — Article</title>
  <link rel="alternate" type="application/rss+xml" title="Note Links RSS" href="feed.xml">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <style>
    [v-cloak] { display: none; }
    .tag { transition: all 0.15s ease; }
    .tag:hover { transform: translateY(-1px); }
    /* Lightweight prose styling for the rendered Markdown body. */
    .prose { color: #374151; line-height: 1.7; }
    .prose h1 { font-size: 1.875rem; font-weight: 700; margin: 1.5rem 0 0.75rem; color: #1f2937; }
    .prose h2 { font-size: 1.5rem; font-weight: 700; margin: 1.4rem 0 0.7rem; color: #1f2937; }
    .prose h3 { font-size: 1.25rem; font-weight: 600; margin: 1.2rem 0 0.6rem; color: #374151; }
    .prose h4 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; color: #374151; }
    .prose p { margin: 0.75rem 0; }
    .prose a { color: #2563eb; text-decoration: underline; }
    .prose a:hover { color: #1d4ed8; }
    .prose ul { list-style: disc; margin: 0.75rem 0; padding-left: 1.5rem; }
    .prose ol { list-style: decimal; margin: 0.75rem 0; padding-left: 1.5rem; }
    .prose li { margin: 0.25rem 0; }
    .prose blockquote { border-left: 4px solid #e5e7eb; padding-left: 1rem; color: #6b7280; margin: 1rem 0; }
    .prose pre { background: #1f2937; color: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; font-size: 0.875rem; }
    .prose code { background: #f3f4f6; padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-size: 0.875em; }
    .prose pre code { background: transparent; padding: 0; }
    .prose img { max-width: 100%; height: auto; border-radius: 0.375rem; margin: 1rem 0; }
    .prose table { border-collapse: collapse; margin: 1rem 0; width: 100%; }
    .prose th, .prose td { border: 1px solid #e5e7eb; padding: 0.5rem 0.75rem; text-align: left; }
    .prose hr { border: 0; border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app" v-cloak>
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
      <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-800">Note Links</h1>
        <nav class="text-sm space-x-4">
          <a href="index.html" class="text-gray-600 hover:text-blue-600">List</a>
          <a href="topics.html" class="text-gray-600 hover:text-blue-600">Topics</a>
          <a href="random.html" class="text-gray-600 hover:text-blue-600">Random</a>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 py-6">
      <!-- Loading State -->
      <div v-if="loading" class="text-center py-12">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
        <p class="mt-2 text-gray-600">Loading article...</p>
      </div>

      <!-- Error State -->
      <div v-else-if="error" class="text-center py-12">
        <p class="text-red-600">{{ error }}</p>
        <p class="text-gray-500 mt-2">
          <a href="index.html" class="text-blue-600 hover:underline">← Back to list</a>
        </p>
      </div>

      <!-- Article -->
      <article v-else class="bg-white rounded-lg shadow-sm border p-6 md:p-8">
        <!-- Title -->
        <h1 class="text-2xl md:text-3xl font-bold text-gray-900">{{ title }}</h1>

        <!-- Meta row -->
        <div class="mt-2 flex flex-wrap items-center gap-x-3 gap-y-1 text-sm text-gray-500">
          <a
            v-if="meta.url"
            :href="meta.url"
            target="_blank"
            rel="noopener noreferrer"
            class="text-blue-600 hover:underline break-all"
          >
            {{ meta.domain || meta.url }} ↗
          </a>
          <span v-if="meta.source_date">· {{ meta.source_date }}</span>
        </div>

        <!-- Tags -->
        <div v-if="tags.length" class="mt-3 flex flex-wrap gap-2">
          <a
            v-for="tag in tags"
            :key="tag"
            :href="'index.html?tag=' + encodeURIComponent(tag)"
            class="tag px-2 py-0.5 bg-gray-100 text-gray-700 text-xs rounded-full hover:bg-blue-100 hover:text-blue-800"
          >
            {{ tag }}
          </a>
        </div>

        <!-- Summary callout -->
        <div v-if="meta.summary" class="mt-4 p-3 bg-blue-50 border border-blue-100 rounded-lg text-sm text-gray-700">
          {{ meta.summary }}
        </div>

        <!-- Cached notice -->
        <p class="mt-4 text-xs text-gray-400 italic">
          Cached copy. Some images or relative links may not resolve —
          <a v-if="meta.url" :href="meta.url" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:underline">view the original</a>.
        </p>

        <hr class="my-6">

        <!-- Rendered Markdown body -->
        <div class="prose max-w-none" v-html="bodyHtml"></div>
      </article>
    </main>

    <!-- Footer -->
    <footer class="mt-12 py-6 border-t bg-white">
      <div class="max-w-3xl mx-auto px-4 text-center text-gray-500 text-sm">
        <a href="index.html" class="hover:text-gray-700">← Back to list</a>
        <span class="mx-2">·</span>
        <a href="feed.xml" class="hover:text-gray-700">RSS</a>
      </div>
    </footer>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const loading = ref(true);
        const error = ref(null);
        const title = ref("");
        const meta = ref({});
        const tags = ref([]);
        const bodyHtml = ref("");

        // Split a Markdown file into its YAML front matter and body.
        const splitFrontMatter = (text) => {
          const match = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
          if (match) {
            let fm = {};
            try {
              fm = jsyaml.load(match[1]) || {};
            } catch (e) {
              fm = {};
            }
            return { frontMatter: fm, body: match[2] };
          }
          return { frontMatter: {}, body: text };
        };

        onMounted(async () => {
          const params = new URLSearchParams(window.location.search);
          const path = params.get("p");

          if (!path) {
            error.value = "No article specified.";
            loading.value = false;
            return;
          }
          // Guard against path traversal / absolute URLs — only allow
          // same-site relative .md files.
          if (path.startsWith("/") || path.includes("..") || path.includes("://") || !path.endsWith(".md")) {
            error.value = "Invalid article path.";
            loading.value = false;
            return;
          }

          try {
            const response = await fetch(path, { cache: "no-store" });
            if (!response.ok) throw new Error("Could not load cached article (it may not exist).");
            const text = await response.text();
            const { frontMatter, body } = splitFrontMatter(text);

            meta.value = frontMatter;
            title.value =
              (frontMatter.page_title || frontMatter.title || "").toString().trim() ||
              frontMatter.url ||
              "Untitled";
            tags.value = Array.isArray(frontMatter.tags) ? frontMatter.tags : [];
            document.title = "Note Links — " + title.value;

            marked.setOptions({ breaks: false, gfm: true });
            bodyHtml.value = marked.parse(body);
          } catch (e) {
            error.value = e.message;
          } finally {
            loading.value = false;
          }
        });

        return { loading, error, title, meta, tags, bodyHtml };
      },
    }).mount("#app");
  </script>
</body>
</html>
